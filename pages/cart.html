<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Cart – Lata Electric</title>
  <link rel="icon" href="../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<div class="top-bar d-none d-md-block">
  <div class="container d-flex justify-content-between align-items-center">
    <span><i class="bi bi-telephone-fill me-1"></i>01700-000000 &nbsp;|&nbsp; <i class="bi bi-geo-alt-fill me-1"></i>Ka/6 Nadda, Gulshan, Dhaka-1212</span>
    <span><i class="bi bi-truck me-1"></i>Free Delivery on Orders Above ৳1000</span>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark main-nav sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
      <img src="../assets/images/logo.jpg" alt="Lata Electric" class="brand-logo" />
      <div><div class="brand-name-bn">লতা ইলেকট্রিক</div><div class="brand-name-en">Lata Electric</div></div>
    </a>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <a href="cart.html" class="nav-icon text-white text-center position-relative">
        <i class="bi bi-cart3 fs-5"></i>
        <span class="badge rounded-pill bg-warning text-dark cart-badge" id="cartCount">0</span>
      </a>
    </div>
  </div>
</nav>

<main class="container py-4">
  <nav aria-label="breadcrumb" class="page-breadcrumb mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
      <li class="breadcrumb-item active">Shopping Cart</li>
    </ol>
  </nav>

  <div class="row g-4" id="cartWrapper">
    <div class="col-12 text-center py-5 text-muted" id="emptyCart">
      <i class="bi bi-cart-x" style="font-size:3rem;opacity:.3"></i>
      <p class="mt-2">Your cart is empty.</p>
      <a href="../index.html" class="btn btn-danger">Continue Shopping</a>
    </div>
  </div>
</main>

<footer class="site-footer mt-5 pt-4 pb-3">
  <div class="container">
    <p class="text-center text-white-50 small mb-0">&copy; 2025 Lata Electric. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/main.js"></script>
<script>
Store.init().then(renderCart);

function renderCart() {
  const items = Cart.getAll();
  const wrapper = document.getElementById('cartWrapper');
  if (!items.length) {
    wrapper.innerHTML = `<div class="col-12 text-center py-5 text-muted">
      <i class="bi bi-cart-x" style="font-size:3rem;opacity:.3"></i>
      <p class="mt-2">Your cart is empty.</p>
      <a href="../index.html" class="btn btn-danger">Continue Shopping</a>
    </div>`;
    return;
  }

  const s        = Store.settings.get();
  const subtotal = items.reduce((a,i)=>a+(i.price*i.qty),0);
  const free     = s.freeDeliveryThreshold || 1000;
  const ship     = s.shipping?.inside || 60;
  const delivery = subtotal >= free ? 0 : ship;
  const total    = subtotal + delivery;

  wrapper.innerHTML = `
    <div class="col-lg-8">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fs-5 fw-bold mb-0">Shopping Cart (${items.length} item${items.length>1?'s':''})</h2>
        <button class="btn btn-outline-danger btn-sm" onclick="clearCart()"><i class="bi bi-trash me-1"></i>Clear Cart</button>
      </div>
      ${items.map(item=>`
        <div class="cart-item">
          <div class="d-flex gap-3 align-items-start">
            <a href="product.html?id=${item.id}">
              ${item.image
                ? `<img src="${item.image}" alt="${item.name}" style="width:72px;height:72px;object-fit:contain;border-radius:8px;background:#f8f9fa;padding:4px">`
                : `<div style="width:72px;height:72px;background:#f8f9fa;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:1.5rem"><i class="bi bi-image"></i></div>`}
            </a>
            <div class="flex-grow-1">
              <div class="fw-semibold"><a href="product.html?id=${item.id}" class="text-dark text-decoration-none">${item.name}</a></div>
              ${item.brand?`<div class="text-muted small">${item.brand}</div>`:''}
              <div class="fw-bold text-danger mt-1">৳${item.price.toLocaleString('en-BD')}</div>
            </div>
            <div class="d-flex flex-column align-items-end gap-2">
              <button class="btn-icon" style="color:#e74c3c;font-size:1rem" onclick="removeItem(${item.id})"><i class="bi bi-x-circle"></i></button>
              <div class="qty-control">
                <button onclick="updateQty(${item.id},-1)">−</button>
                <input type="number" value="${item.qty}" min="1" style="width:40px;border:none;text-align:center;font-weight:600" readonly />
                <button onclick="updateQty(${item.id},1)">+</button>
              </div>
              <div class="fw-bold small">৳${(item.price*item.qty).toLocaleString('en-BD')}</div>
            </div>
          </div>
        </div>`).join('')}
    </div>
    <div class="col-lg-4">
      <div class="cart-summary">
        <h5 class="fw-bold mb-3">Order Summary</h5>
        <div class="d-flex justify-content-between mb-2 small"><span>Subtotal (${items.reduce((a,i)=>a+i.qty,0)} items)</span><span>৳${subtotal.toLocaleString('en-BD')}</span></div>
        <div class="d-flex justify-content-between mb-2 small"><span>Delivery (Dhaka)</span><span>${delivery===0?'<span class="text-success fw-semibold">FREE</span>':'৳'+delivery.toLocaleString('en-BD')}</span></div>
        ${subtotal<free?`<div class="small text-muted mb-2">Add ৳${(free-subtotal).toLocaleString('en-BD')} more for free delivery</div>`:''}
        <hr/>
        <div class="d-flex justify-content-between fw-bold mb-3"><span>Total</span><span class="text-danger fs-5">৳${total.toLocaleString('en-BD')}</span></div>
        <a href="checkout.html" class="btn btn-danger w-100 fw-bold py-2">Proceed to Checkout</a>
        <a href="../index.html" class="btn btn-outline-secondary w-100 mt-2 small">Continue Shopping</a>
      </div>
    </div>`;
}

function updateQty(id, d) {
  const item = Cart.getAll().find(i=>i.id===id);
  if (!item) return;
  const newQty = item.qty + d;
  if (newQty < 1) { removeItem(id); return; }
  Cart.update(id, newQty);
  renderCart();
}

function removeItem(id) {
  Cart.remove(id);
  renderCart();
}

function clearCart() {
  if (confirm('Clear all items from cart?')) { Cart.clear(); renderCart(); }
}
</script>
</body>
</html>
