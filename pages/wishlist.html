<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Wishlist – Lata Electric</title>
  <link rel="icon" href="../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<div class="top-bar d-none d-md-block">
  <div class="container d-flex justify-content-between align-items-center">
    <span><i class="bi bi-telephone-fill me-1"></i>01700-000000 &nbsp;|&nbsp; <i class="bi bi-geo-alt-fill me-1"></i>Ka/6 Nadda, Gulshan, Dhaka-1212</span>
    <span><i class="bi bi-truck me-1"></i>Free Delivery on Orders Above ৳1000</span>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark main-nav sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
      <img src="../assets/images/logo.jpg" alt="Lata Electric" class="brand-logo" />
      <div><div class="brand-name-bn">লতা ইলেকট্রিক</div><div class="brand-name-en">Lata Electric</div></div>
    </a>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <a href="wishlist.html" class="nav-icon text-white text-center"><i class="bi bi-heart-fill fs-5 text-danger"></i><div class="nav-icon-label d-none d-lg-block">Wishlist</div></a>
      <a href="cart.html" class="nav-icon text-white text-center position-relative">
        <i class="bi bi-cart3 fs-5"></i>
        <span class="badge rounded-pill bg-warning text-dark cart-badge" id="cartCount">0</span>
        <div class="nav-icon-label d-none d-lg-block">Cart</div>
      </a>
    </div>
  </div>
</nav>

<main class="container py-4">
  <nav aria-label="breadcrumb" class="page-breadcrumb mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
      <li class="breadcrumb-item active">Wishlist</li>
    </ol>
  </nav>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="fs-4 fw-bold mb-0"><i class="bi bi-heart-fill text-danger me-2"></i>My Wishlist</h1>
    <button class="btn btn-outline-danger btn-sm" onclick="clearWishlist()"><i class="bi bi-trash me-1"></i>Clear All</button>
  </div>

  <div id="wishlistContent">
    <div class="text-center py-5 text-muted">Loading…</div>
  </div>
</main>

<footer class="site-footer mt-5 pt-4 pb-3">
  <div class="container">
    <p class="text-center text-white-50 small mb-0">&copy; 2025 Lata Electric. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/main.js"></script>
<script>
Store.init().then(renderWishlist);

function renderWishlist() {
  const ids  = Store.wishlist.all();
  const prods = ids.map(id => Store.products.byId(id)).filter(Boolean);
  const el   = document.getElementById('wishlistContent');

  if (!prods.length) {
    el.innerHTML = `<div class="text-center py-5">
      <i class="bi bi-heart" style="font-size:3rem;opacity:.3"></i>
      <p class="mt-3 text-muted">Your wishlist is empty.</p>
      <a href="../index.html" class="btn btn-danger">Browse Products</a>
    </div>`;
    return;
  }

  el.innerHTML = `<p class="text-muted small mb-3">${prods.length} item${prods.length>1?'s':''}</p>
    <div class="row g-3">
      ${prods.map(p => {
        const price = p.flashSale && p.flashPrice ? p.flashPrice : p.price;
        return `<div class="col-6 col-md-4 col-lg-3">
          <div class="product-card">
            <div class="product-img-wrap">
              <a href="product.html?id=${p.id}">
                ${p.image?`<img src="${p.image}" alt="${p.name}" loading="lazy">`:
                  `<div class="product-img-placeholder"><i class="bi bi-image"></i></div>`}
              </a>
              <div class="product-actions" style="opacity:1">
                <button class="action-btn wishlisted" title="Remove" onclick="removeWL(${p.id})"><i class="bi bi-heart-fill"></i></button>
              </div>
            </div>
            <div class="product-info">
              <div class="product-brand">${p.brand||''}</div>
              <div class="product-name"><a href="product.html?id=${p.id}">${p.name}</a></div>
              <div class="product-price"><span class="price-current">৳${price.toLocaleString('en-BD')}</span></div>
              <button class="btn-add-cart" ${p.stock===0?'disabled':''} onclick="addCart(${p.id},this)">
                <i class="bi bi-cart-plus me-1"></i>Add to Cart
              </button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function removeWL(id) {
  Store.wishlist.toggle(id);
  renderWishlist();
}

function addCart(id, btn) {
  const p = Store.products.byId(id);
  if (!p) return;
  Cart.add(p);
  btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Added!';
  btn.disabled = true;
  setTimeout(()=>{ btn.innerHTML='<i class="bi bi-cart-plus me-1"></i>Add to Cart'; btn.disabled=p.stock===0; },1200);
}

function clearWishlist() {
  if (!confirm('Clear all wishlist items?')) return;
  Store.wishlist.all().forEach(id => Store.wishlist.toggle(id));
  renderWishlist();
}
</script>
</body>
</html>
