<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Category – Lata Electric</title>
  <link rel="icon" href="../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<div class="top-bar d-none d-md-block">
  <div class="container d-flex justify-content-between align-items-center">
    <span><i class="bi bi-telephone-fill me-1"></i>01700-000000 &nbsp;|&nbsp; <i class="bi bi-geo-alt-fill me-1"></i>Ka/6 Nadda, Gulshan, Dhaka-1212</span>
    <span><i class="bi bi-truck me-1"></i>Free Delivery on Orders Above ৳1000</span>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark main-nav sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
      <img src="../assets/images/logo.jpg" alt="Lata Electric" class="brand-logo" />
      <div><div class="brand-name-bn">লতা ইলেকট্রিক</div><div class="brand-name-en">Lata Electric</div></div>
    </a>
    <form class="d-flex mx-auto search-form" role="search" onsubmit="return false;">
      <div class="input-group">
        <input id="searchInput" class="form-control search-input" type="search" placeholder="Search products…" autocomplete="off" />
        <button class="btn btn-warning search-btn" type="submit"><i class="bi bi-search"></i></button>
      </div>
    </form>
    <div class="d-flex align-items-center gap-3 ms-3">
      <a href="wishlist.html" class="nav-icon text-white text-center d-none d-lg-block"><i class="bi bi-heart fs-5"></i><div class="nav-icon-label">Wishlist</div></a>
      <a href="cart.html" class="nav-icon text-white text-center position-relative">
        <i class="bi bi-cart3 fs-5"></i>
        <span class="badge rounded-pill bg-warning text-dark cart-badge" id="cartCount">0</span>
        <div class="nav-icon-label d-none d-lg-block">Cart</div>
      </a>
    </div>
  </div>
</nav>

<main class="container py-4">
  <nav aria-label="breadcrumb" class="page-breadcrumb mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
      <li class="breadcrumb-item"><a href="all-products.html">All Products</a></li>
      <li class="breadcrumb-item active" id="bcCat">Category</li>
    </ol>
  </nav>

  <div class="row g-4">
    <!-- Category sidebar (desktop) -->
    <aside class="col-lg-3 d-none d-lg-block">
      <div class="filter-panel">
        <div class="filter-title"><i class="bi bi-grid-fill me-1"></i>Categories</div>
        <div id="catSidebarList" class="d-flex flex-column gap-1"></div>
      </div>
    </aside>

    <div class="col-lg-9">
      <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
        <div class="cat-grid-icon flex-shrink-0" id="catIconEl" style="background:#ccc;width:44px;height:44px;font-size:1.2rem">
          <i class="bi bi-grid"></i>
        </div>
        <h1 class="section-title mb-0" id="catTitle">Loading…</h1>
        <span class="text-muted small ms-auto" id="catCount"></span>
      </div>

      <!-- Sort + search bar -->
      <div class="d-flex gap-2 mb-3 flex-wrap">
        <input type="search" id="catSearch" class="form-control form-control-sm" placeholder="Search in this category…" style="max-width:220px" oninput="renderProducts()" />
        <select id="catSort" class="form-select form-select-sm" style="max-width:170px" onchange="renderProducts()">
          <option value="default">Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name A–Z</option>
        </select>
      </div>

      <div class="row g-3" id="productGrid">
        <div class="col-12 text-center py-5 text-muted">Loading…</div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer mt-5 pt-4 pb-3">
  <div class="container">
    <p class="text-center text-white-50 small mb-0">&copy; 2025 Lata Electric. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/main.js"></script>
<script>
const catId = +new URLSearchParams(location.search).get('id');
let catProducts = [];

Store.init().then(() => {
  const cat = Store.categories.byId(catId);
  if (!cat) {
    document.getElementById('catTitle').textContent = 'Category not found';
    document.getElementById('productGrid').innerHTML = '<div class="col-12"><div class="alert alert-warning">Category not found.</div></div>';
    return;
  }

  document.title = cat.name + ' – Lata Electric';
  document.getElementById('bcCat').textContent  = cat.name;
  document.getElementById('catTitle').textContent = cat.name;
  const icon = document.getElementById('catIconEl');
  icon.style.background = cat.color || 'var(--primary)';
  icon.innerHTML = `<i class="bi ${cat.icon||'bi-grid'}"></i>`;

  // Build category sidebar
  const all = Store.categories.all();
  document.getElementById('catSidebarList').innerHTML = all.map(c =>
    `<a href="category.html?id=${c.id}" class="text-decoration-none py-1 px-2 rounded small d-flex align-items-center gap-2${c.id===catId?' fw-semibold text-danger':' text-dark'}">
      <span class="d-inline-flex align-items-center justify-content-center rounded" style="width:22px;height:22px;background:${c.color||'#ccc'};font-size:0.65rem;color:#fff;flex-shrink:0"><i class="bi ${c.icon||'bi-grid'}"></i></span>
      ${c.name}
    </a>`).join('');

  catProducts = Store.products.byCategory(catId);
  document.getElementById('catCount').textContent = `${catProducts.length} product${catProducts.length!==1?'s':''}`;
  renderProducts();
});

function renderProducts() {
  let list    = [...catProducts];
  const q     = document.getElementById('catSearch').value.toLowerCase();
  const sort  = document.getElementById('catSort').value;
  if (q) list = list.filter(p => p.name.toLowerCase().includes(q) || (p.brand||'').toLowerCase().includes(q));
  const gp    = p => p.flashSale&&p.flashPrice?p.flashPrice:p.price;
  if (sort==='price-asc')  list.sort((a,b)=>gp(a)-gp(b));
  if (sort==='price-desc') list.sort((a,b)=>gp(b)-gp(a));
  if (sort==='name-asc')   list.sort((a,b)=>a.name.localeCompare(b.name));

  document.getElementById('productGrid').innerHTML = list.length
    ? list.map(p=>{
        const price=gp(p);
        const orig=p.flashSale&&p.flashPrice?p.price:(p.originalPrice&&p.originalPrice>p.price?p.originalPrice:null);
        const disc=orig?Math.round((1-price/orig)*100):0;
        return `<div class="col-6 col-md-4">
          <div class="product-card">
            <div class="product-img-wrap">
              <a href="product.html?id=${p.id}">
                ${p.image?`<img src="${p.image}" alt="${p.name}" loading="lazy">`:
                  `<div class="product-img-placeholder"><i class="bi bi-image"></i></div>`}
              </a>
              <div class="product-badges">
                ${p.flashSale?'<span class="badge-flash">SALE</span>':''}
                ${p.stock===0?'<span class="badge-out">OUT</span>':''}
              </div>
              <div class="product-actions">
                <button class="action-btn${Store.wishlist.has(p.id)?' wishlisted':''}" onclick="toggleWL(${p.id},this)">
                  <i class="bi bi-heart${Store.wishlist.has(p.id)?'-fill':''}"></i>
                </button>
              </div>
            </div>
            <div class="product-info">
              <div class="product-brand">${p.brand||''}</div>
              <div class="product-name"><a href="product.html?id=${p.id}">${p.name}</a></div>
              <div class="product-price">
                <span class="price-current">৳${price.toLocaleString('en-BD')}</span>
                ${orig?`<span class="price-original">৳${orig.toLocaleString('en-BD')}</span>`:''}
                ${disc?`<span class="badge-sale">-${disc}%</span>`:''}
              </div>
              <button class="btn-add-cart" ${p.stock===0?'disabled':''} onclick="addCart(${p.id},this)">
                ${p.stock===0?'Out of Stock':'<i class="bi bi-cart-plus me-1"></i>Add to Cart'}
              </button>
            </div>
          </div>
        </div>`;
      }).join('')
    : '<div class="col-12 text-center py-5 text-muted"><i class="bi bi-search" style="font-size:2rem;opacity:.3"></i><p class="mt-2">No products found in this category.</p></div>';
}

function addCart(id,btn){const p=Store.products.byId(id);if(!p)return;Cart.add(p);btn.innerHTML='<i class="bi bi-check-circle me-1"></i>Added!';btn.disabled=true;setTimeout(()=>{btn.innerHTML='<i class="bi bi-cart-plus me-1"></i>Add to Cart';btn.disabled=p.stock===0;},1200);}
function toggleWL(id,btn){Store.wishlist.toggle(id);const has=Store.wishlist.has(id);btn.querySelector('i').className=has?'bi bi-heart-fill':'bi bi-heart';btn.classList.toggle('wishlisted',has);}
</script>
</body>
</html>
