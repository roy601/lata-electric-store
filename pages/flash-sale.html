<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Flash Sale – Lata Electric</title>
  <link rel="icon" href="../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<div class="top-bar d-none d-md-block">
  <div class="container d-flex justify-content-between align-items-center">
    <span><i class="bi bi-telephone-fill me-1"></i>01700-000000 &nbsp;|&nbsp; <i class="bi bi-geo-alt-fill me-1"></i>Ka/6 Nadda, Gulshan, Dhaka-1212</span>
    <span><i class="bi bi-truck me-1"></i>Free Delivery on Orders Above ৳1000</span>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark main-nav sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
      <img src="../assets/images/logo.jpg" alt="Lata Electric" class="brand-logo" />
      <div><div class="brand-name-bn">লতা ইলেকট্রিক</div><div class="brand-name-en">Lata Electric</div></div>
    </a>
    <form class="d-flex mx-auto search-form" role="search" onsubmit="return false;">
      <div class="input-group">
        <input id="searchInput" class="form-control search-input" type="search" placeholder="Search products…" autocomplete="off" />
        <button class="btn btn-warning search-btn" type="submit"><i class="bi bi-search"></i></button>
      </div>
    </form>
    <div class="d-flex align-items-center gap-3 ms-3">
      <a href="wishlist.html" class="nav-icon text-white text-center d-none d-lg-block"><i class="bi bi-heart fs-5"></i><div class="nav-icon-label">Wishlist</div></a>
      <a href="cart.html" class="nav-icon text-white text-center position-relative">
        <i class="bi bi-cart3 fs-5"></i>
        <span class="badge rounded-pill bg-warning text-dark cart-badge" id="cartCount">0</span>
        <div class="nav-icon-label d-none d-lg-block">Cart</div>
      </a>
    </div>
  </div>
</nav>

<main class="container py-4">
  <nav aria-label="breadcrumb" class="page-breadcrumb mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
      <li class="breadcrumb-item active">Flash Sale</li>
    </ol>
  </nav>

  <!-- Hero Banner -->
  <div class="rounded-3 p-4 mb-4 text-center text-white"
       style="background:linear-gradient(135deg,#1a1a2e,#c0392b)">
    <i class="bi bi-lightning-charge-fill" style="font-size:2.5rem"></i>
    <h1 class="fw-bold mt-2 mb-1">Flash Sale</h1>
    <p class="mb-2 opacity-75">Limited time deals on top electrical products</p>
    <div id="flashCountdownWrap" class="d-none">
      <div class="small opacity-75 mb-1">Sale ends in:</div>
      <div class="d-flex justify-content-center gap-2" id="countdownDisplay"></div>
    </div>
  </div>

  <div id="flashContent">
    <div class="text-center py-5 text-muted">Loading…</div>
  </div>
</main>

<footer class="site-footer mt-5 pt-4 pb-3">
  <div class="container">
    <p class="text-center text-white-50 small mb-0">&copy; 2025 Lata Electric. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/main.js"></script>
<script>
Store.init().then(() => {
  const s     = Store.settings.get();
  const prods = Store.products.flashSale();

  // Countdown
  if (s.flashSaleActive && s.flashSaleEnds) {
    const wrap = document.getElementById('flashCountdownWrap');
    const disp = document.getElementById('countdownDisplay');
    wrap.classList.remove('d-none');
    const tick = () => {
      const diff = new Date(s.flashSaleEnds) - Date.now();
      if (diff <= 0) { disp.innerHTML = '<span class="fw-bold">Sale Ended</span>'; return; }
      const d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),m=Math.floor(diff%3600000/60000),sec=Math.floor(diff%60000/1000);
      disp.innerHTML = [d&&`${d}d`,`${String(h).padStart(2,'0')}h`,`${String(m).padStart(2,'0')}m`,`${String(sec).padStart(2,'0')}s`]
        .filter(Boolean).map(t=>`<div class="px-3 py-2 rounded fw-bold fs-5" style="background:rgba(255,255,255,0.15)">${t}</div>`).join('');
    };
    tick(); setInterval(tick,1000);
  }

  if (!prods.length) {
    document.getElementById('flashContent').innerHTML = `
      <div class="text-center py-5">
        <i class="bi bi-lightning" style="font-size:3rem;opacity:.3"></i>
        <p class="mt-3 text-muted">No flash sale products right now. Check back soon!</p>
        <a href="../index.html" class="btn btn-danger">Browse All Products</a>
      </div>`;
    return;
  }

  document.getElementById('flashContent').innerHTML = `
    <p class="text-muted small mb-3">${prods.length} deal${prods.length>1?'s':''} available</p>
    <div class="row g-3">
      ${prods.map(p => {
        const disc = Math.round((1 - p.flashPrice/p.price)*100);
        return `<div class="col-6 col-md-4 col-lg-3">
          <div class="product-card">
            <div class="product-img-wrap">
              <a href="product.html?id=${p.id}">
                ${p.image?`<img src="${p.image}" alt="${p.name}" loading="lazy">`:
                  `<div class="product-img-placeholder"><i class="bi bi-image"></i></div>`}
              </a>
              <div class="product-badges"><span class="badge-flash">-${disc}%</span></div>
            </div>
            <div class="product-info">
              <div class="product-brand">${p.brand||''}</div>
              <div class="product-name"><a href="product.html?id=${p.id}">${p.name}</a></div>
              <div class="product-price">
                <span class="price-current">৳${p.flashPrice.toLocaleString('en-BD')}</span>
                <span class="price-original">৳${p.price.toLocaleString('en-BD')}</span>
              </div>
              <button class="btn-add-cart" ${p.stock===0?'disabled':''} onclick="addToCart(${p.id},this)">
                <i class="bi bi-cart-plus me-1"></i>Add to Cart
              </button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
});

function addToCart(id, btn) {
  const p = Store.products.byId(id);
  if (!p) return;
  Cart.add(p);
  const orig = btn.innerHTML;
  btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Added!';
  btn.disabled = true;
  setTimeout(()=>{ btn.innerHTML=orig; btn.disabled=p.stock===0; },1200);
}
</script>
</body>
</html>
