<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Product – Lata Electric</title>
  <link rel="icon" href="../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar d-none d-md-block">
  <div class="container d-flex justify-content-between align-items-center">
    <span><i class="bi bi-telephone-fill me-1"></i>01700-000000 &nbsp;|&nbsp; <i class="bi bi-geo-alt-fill me-1"></i>Ka/6 Nadda, Gulshan, Dhaka-1212</span>
    <span><i class="bi bi-truck me-1"></i>Free Delivery on Orders Above ৳1000</span>
  </div>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark main-nav sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
      <img src="../assets/images/logo.jpg" alt="Lata Electric" class="brand-logo" />
      <div><div class="brand-name-bn">লতা ইলেকট্রিক</div><div class="brand-name-en">Lata Electric</div></div>
    </a>
    <form class="d-flex mx-auto search-form" role="search" onsubmit="return false;">
      <div class="input-group">
        <input id="searchInput" class="form-control search-input" type="search" placeholder="Search products…" autocomplete="off" />
        <button class="btn btn-warning search-btn" type="submit"><i class="bi bi-search"></i></button>
      </div>
    </form>
    <div class="d-flex align-items-center gap-3 ms-3">
      <a href="wishlist.html" class="nav-icon text-white text-center d-none d-lg-block"><i class="bi bi-heart fs-5"></i><div class="nav-icon-label">Wishlist</div></a>
      <a href="cart.html" class="nav-icon text-white text-center position-relative">
        <i class="bi bi-cart3 fs-5"></i>
        <span class="badge rounded-pill bg-warning text-dark cart-badge" id="cartCount">0</span>
        <div class="nav-icon-label d-none d-lg-block">Cart</div>
      </a>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="container py-4">
  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="page-breadcrumb mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
      <li class="breadcrumb-item"><a href="all-products.html">All Products</a></li>
      <li class="breadcrumb-item active" id="bcProduct">Product</li>
    </ol>
  </nav>

  <div id="productContent">
    <div class="text-center py-5 text-muted">Loading product…</div>
  </div>

  <!-- Related Products -->
  <div id="relatedSection" class="d-none mt-5">
    <h3 class="section-title mb-3">Related Products</h3>
    <div class="row g-3" id="relatedGrid"></div>
  </div>
</main>

<!-- FOOTER -->
<footer class="site-footer mt-5 pt-4 pb-3">
  <div class="container">
    <p class="text-center text-white-50 small mb-0">&copy; 2025 Lata Electric. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/main.js"></script>
<script>
const params = new URLSearchParams(location.search);
const pid    = +params.get('id');
let qty = 1;

Store.init().then(() => {
  const p = Store.products.byId(pid);
  if (!p) { document.getElementById('productContent').innerHTML = '<div class="alert alert-danger">Product not found.</div>'; return; }

  const price  = p.flashSale && p.flashPrice ? p.flashPrice : p.price;
  const orig   = p.flashSale && p.flashPrice ? p.price : (p.originalPrice && p.originalPrice > p.price ? p.originalPrice : null);
  const disc   = orig ? Math.round((1-price/orig)*100) : 0;
  const cat    = Store.categories.byId(p.categoryId);
  document.title = `${p.name} – Lata Electric`;
  document.getElementById('bcProduct').textContent = p.name;

  document.getElementById('productContent').innerHTML = `
    <div class="row g-4">
      <div class="col-md-5">
        <div class="product-detail-img">
          ${p.image
            ? `<img src="${p.image}" alt="${p.name}" id="mainImg" style="max-height:320px;object-fit:contain;width:100%">`
            : `<div class="product-img-placeholder" style="font-size:5rem;color:#ddd"><i class="bi bi-image"></i></div>`}
        </div>
      </div>
      <div class="col-md-7">
        ${cat?`<span class="badge bg-danger mb-2">${cat.name}</span>`:''}
        <h1 class="fs-4 fw-bold mb-1">${p.name}</h1>
        ${p.brand ? `<div class="text-muted small mb-2">Brand: <strong>${p.brand}</strong>${p.sku?` &nbsp;·&nbsp; SKU: <strong>${p.sku}</strong>`:''}</div>` : ''}

        <div class="product-price mb-3 product-detail-price">
          <span class="price-current">৳${price.toLocaleString('en-BD')}</span>
          ${orig ? `<span class="price-original ms-2">৳${orig.toLocaleString('en-BD')}</span>` : ''}
          ${disc ? `<span class="badge-sale ms-2">-${disc}% OFF</span>` : ''}
        </div>

        ${p.flashSale?'<div class="alert alert-warning py-2 small mb-3"><i class="bi bi-lightning-charge-fill me-1"></i>Flash Sale Price!</div>':''}

        <div class="d-flex align-items-center gap-3 mb-4">
          <div class="qty-control">
            <button onclick="changeQty(-1)">−</button>
            <input type="number" id="qtyInput" value="1" min="1" max="${p.stock||99}" readonly />
            <button onclick="changeQty(1)">+</button>
          </div>
          <span class="text-muted small">${p.stock>0?`${p.stock} in stock`:'<span class="text-danger fw-semibold">Out of Stock</span>'}</span>
        </div>

        <div class="d-flex gap-3 flex-wrap mb-4">
          <button class="btn btn-danger px-4 fw-bold" ${p.stock===0?'disabled':''} onclick="addToCart()">
            <i class="bi bi-cart-plus me-1"></i>Add to Cart
          </button>
          <button class="btn btn-outline-danger" onclick="toggleWL()" id="wlBtn">
            <i class="bi bi-heart${Store.wishlist.has(p.id)?'-fill':''} me-1" id="wlIcon"></i>Wishlist
          </button>
        </div>

        <div class="border-top pt-3">
          <p class="mb-1 small text-muted">${p.description||'Quality electrical product from Lata Electric.'}</p>
          <div class="d-flex gap-4 mt-3 small text-muted">
            <span><i class="bi bi-truck me-1"></i>Fast Delivery</span>
            <span><i class="bi bi-shield-check me-1"></i>Genuine Product</span>
            <span><i class="bi bi-arrow-counterclockwise me-1"></i>Easy Return</span>
          </div>
        </div>
      </div>
    </div>`;

  // Related
  const related = Store.products.byCategory(p.categoryId).filter(r=>r.id!==p.id).slice(0,4);
  if (related.length) {
    document.getElementById('relatedSection').classList.remove('d-none');
    document.getElementById('relatedGrid').innerHTML = related.map(r => {
      const rp = r.flashSale && r.flashPrice ? r.flashPrice : r.price;
      return `<div class="col-6 col-md-3">
        <div class="product-card">
          <div class="product-img-wrap"><a href="product.html?id=${r.id}">
            ${r.image?`<img src="${r.image}" alt="${r.name}" loading="lazy">`:
              `<div class="product-img-placeholder"><i class="bi bi-image"></i></div>`}
          </a></div>
          <div class="product-info">
            <div class="product-name"><a href="product.html?id=${r.id}">${r.name}</a></div>
            <div class="product-price"><span class="price-current">৳${rp.toLocaleString('en-BD')}</span></div>
            <button class="btn-add-cart" ${r.stock===0?'disabled':''} onclick="Cart.add(Store.products.byId(${r.id}));this.textContent='Added!'">
              <i class="bi bi-cart-plus me-1"></i>Add to Cart
            </button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
});

function changeQty(d) {
  const inp = document.getElementById('qtyInput');
  qty = Math.max(1, Math.min(+inp.max, (qty||1) + d));
  inp.value = qty;
}

function addToCart() {
  const p = Store.products.byId(pid);
  if (!p) return;
  for (let i=0;i<qty;i++) Cart.add(p);
  const btn = event.currentTarget;
  btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Added!';
  setTimeout(()=>{ btn.innerHTML = '<i class="bi bi-cart-plus me-1"></i>Add to Cart'; }, 1500);
}

function toggleWL() {
  Store.wishlist.toggle(pid);
  document.getElementById('wlIcon').className = Store.wishlist.has(pid) ? 'bi bi-heart-fill me-1' : 'bi bi-heart me-1';
}
</script>
</body>
</html>
