<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Dashboard – Lata Electric Admin</title>
  <link rel="icon" href="../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body data-page="dashboard" data-title="Dashboard" data-subtitle="Welcome back, Admin">
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>
  <div class="admin-main">
    <header class="admin-topbar" id="adminTopbar"></header>
    <div class="admin-content">

      <!-- Stat Cards -->
      <div class="stat-grid" id="statGrid"></div>

      <div class="row g-4">
        <!-- Recent Orders -->
        <div class="col-lg-8">
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title"><i class="bi bi-bag me-2"></i>Recent Orders</span>
              <a href="pages/orders.html" class="btn btn-sm btn-outline-secondary">View All</a>
            </div>
            <div class="table-responsive">
              <table class="admin-table">
                <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
                <tbody id="recentOrders"><tr><td colspan="6" class="text-center py-4 text-muted">No orders yet</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Quick Actions + Low Stock -->
        <div class="col-lg-4">
          <div class="panel mb-4">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-lightning me-2"></i>Quick Actions</span></div>
            <div class="panel-body d-grid gap-2">
              <a href="pages/products.html?action=add" class="btn btn-sm btn-primary-admin btn-danger"><i class="bi bi-plus-circle me-1"></i>Add New Product</a>
              <a href="pages/orders.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-bag me-1"></i>Manage Orders</a>
              <a href="pages/featured.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-star me-1"></i>Edit Featured Products</a>
              <a href="pages/flash-sale.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-lightning me-1"></i>Flash Sale</a>
              <a href="pages/settings.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-gear me-1"></i>Settings</a>
              <a href="../index.html" target="_blank" class="btn btn-sm btn-outline-secondary"><i class="bi bi-eye me-1"></i>View Website</a>
            </div>
          </div>

          <div class="panel">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-exclamation-triangle me-2 text-warning"></i>Low Stock</span></div>
            <div id="lowStockList" class="panel-body p-0">
              <div class="text-center py-3 text-muted small">Loading…</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Top Selling Products -->
      <div class="panel mt-2">
        <div class="panel-header">
          <span class="panel-title"><i class="bi bi-trophy me-2"></i>Top Selling Products</span>
          <a href="pages/products.html" class="btn btn-sm btn-outline-secondary">All Products</a>
        </div>
        <div class="table-responsive">
          <table class="admin-table">
            <thead><tr><th>#</th><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th></tr></thead>
            <tbody id="topProductsTable"><tr><td colspan="6" class="text-center py-4 text-muted">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../assets/js/store.js"></script>
<script src="assets/js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const stats   = Store.orders.stats();
  const prods   = Store.products.all();
  const cats    = Store.categories.all();

  /* Stat cards */
  const cards = [
    { label:'Total Revenue',  value: taka(stats.revenue),     icon:'bi-currency-dollar', color:'#c0392b', change:'' },
    { label:'Total Orders',   value: stats.total,             icon:'bi-bag',             color:'#2980b9', change:'' },
    { label:'Pending Orders', value: stats.pending,           icon:'bi-clock',           color:'#f39c12', change:'' },
    { label:'Products',       value: prods.length,            icon:'bi-box-seam',        color:'#27ae60', change:'' },
    { label:'Categories',     value: cats.length,             icon:'bi-grid',            color:'#8e44ad', change:'' },
    { label:'Low Stock',      value: prods.filter(p=>p.stock<10).length, icon:'bi-exclamation-triangle', color:'#e67e22', change:'' },
  ];
  document.getElementById('statGrid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-icon" style="background:${c.color}"><i class="bi ${c.icon}"></i></div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-label">${c.label}</div>
    </div>`).join('');

  /* Recent orders */
  const orders = Store.orders.all().slice(0,8);
  document.getElementById('recentOrders').innerHTML = orders.length
    ? orders.map(o => `<tr>
        <td><a href="pages/orders.html" class="fw-semibold text-danger">${o.id}</a></td>
        <td>${o.customer?.name || '—'}</td>
        <td>${(o.items||[]).length} item(s)</td>
        <td class="fw-semibold">${taka(o.total)}</td>
        <td>${statusBadge(o.status)}</td>
        <td>${fmtDate(o.createdAt)}</td>
      </tr>`).join('')
    : '<tr><td colspan="6" class="text-center py-4 text-muted">No orders yet</td></tr>';

  /* Low stock */
  const low = prods.filter(p => p.stock < 10).slice(0,6);
  document.getElementById('lowStockList').innerHTML = low.length
    ? low.map(p => `<div class="d-flex align-items-center justify-content-between px-3 py-2 border-bottom">
        <span class="small fw-semibold text-truncate me-2">${p.name}</span>
        <span class="badge ${p.stock===0?'bg-danger':'bg-warning text-dark'}">${p.stock} left</span>
      </div>`).join('')
    : '<div class="text-center py-3 text-muted small">All products well stocked</div>';

  /* Top products */
  const top = Store.products.topSells().slice(0,8);
  document.getElementById('topProductsTable').innerHTML = top.length
    ? top.map((p,i) => `<tr>
        <td class="text-muted">${i+1}</td>
        <td><div class="d-flex align-items-center gap-2">${productImg(p.image,p.name)}<span class="fw-semibold">${p.name}</span></div></td>
        <td>${catName(p.categoryId)}</td>
        <td class="fw-semibold">${taka(p.price)}</td>
        <td><span class="${p.stock<10?'text-danger fw-bold':''}">${p.stock}</span></td>
        <td>${statusBadge(p.stock>0?'active':'inactive')}</td>
      </tr>`).join('')
    : '<tr><td colspan="6" class="text-center py-4 text-muted">No top sell products set</td></tr>';
});
</script>
</body>
</html>
