<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Customers – Lata Electric Admin</title>
  <link rel="icon" href="../../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body data-page="customers" data-title="Customers" data-subtitle="View and manage customer records">
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>
  <div class="admin-main">
    <header class="admin-topbar" id="adminTopbar"></header>
    <div class="admin-content">
      <div class="page-header">
        <div>
          <div class="breadcrumb"><a href="../index.html">Dashboard</a> / Customers</div>
          <h1>Customers</h1>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="filter-bar">
            <input type="search" id="searchCustomer" class="form-control" placeholder="Search customers…" />
          </div>
          <span class="text-muted small ms-auto" id="custCount"></span>
        </div>
        <div class="table-responsive">
          <table class="admin-table">
            <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Address</th><th>Orders</th><th>Joined</th><th>Actions</th></tr></thead>
            <tbody id="custTable"></tbody>
          </table>
        </div>
        <div class="d-flex justify-content-end p-3" id="custPagination"></div>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/store.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
let currentPage = 1;
const PER_PAGE = 20;

document.addEventListener('DOMContentLoaded', () => {
  renderTable();
  document.getElementById('searchCustomer').addEventListener('input', () => { currentPage=1; renderTable(); });
});

function renderTable() {
  let list = Store.customers.all();
  const q  = document.getElementById('searchCustomer').value.toLowerCase();
  if (q) list = list.filter(c => (c.name||'').toLowerCase().includes(q) || (c.phone||'').includes(q) || (c.email||'').toLowerCase().includes(q));
  document.getElementById('custCount').textContent = `${list.length} customer${list.length!==1?'s':''}`;

  const { items, pages } = paginate(list, currentPage, PER_PAGE);
  const orders = Store.orders.all();
  const tbody  = document.getElementById('custTable');

  tbody.innerHTML = items.length
    ? items.map(c => {
        const orderCount = orders.filter(o => o.customer?.phone === c.phone).length;
        return `<tr>
          <td class="fw-semibold">${c.name||'—'}</td>
          <td>${c.phone||'—'}</td>
          <td>${c.email||'—'}</td>
          <td class="text-muted small">${c.address||'—'}</td>
          <td>${orderCount}</td>
          <td>${fmtDate(c.createdAt)}</td>
          <td><button class="btn-icon btn-delete" onclick="deleteCustomer(${c.id})" title="Delete"><i class="bi bi-trash"></i></button></td>
        </tr>`;
      }).join('')
    : '<tr><td colspan="7"><div class="empty-state"><i class="bi bi-people"></i><p>No customers yet. Customers are added automatically when they place an order.</p></div></td></tr>';

  renderPagination('custPagination', currentPage, pages, p=>{ currentPage=p; renderTable(); });
}

function deleteCustomer(id) {
  confirmDelete('Delete this customer record?', () => { Store.customers.delete(id); toast('Customer deleted','warning'); renderTable(); });
}
</script>
</body>
</html>
