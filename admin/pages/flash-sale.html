<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Flash Sale – Lata Electric Admin</title>
  <link rel="icon" href="../../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body data-page="flash-sale" data-title="Flash Sale" data-subtitle="Manage flash sale products and timer">
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>
  <div class="admin-main">
    <header class="admin-topbar" id="adminTopbar"></header>
    <div class="admin-content">
      <div class="page-header">
        <div>
          <div class="breadcrumb"><a href="../index.html">Dashboard</a> / Flash Sale</div>
          <h1>Flash Sale</h1>
        </div>
      </div>

      <!-- Flash Sale Global Settings -->
      <div class="panel mb-4">
        <div class="panel-header"><span class="panel-title"><i class="bi bi-lightning-charge me-2"></i>Flash Sale Settings</span></div>
        <div class="panel-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="flashActive" onchange="saveFlashSettings()" />
                <label class="form-check-label fw-semibold" for="flashActive">Flash Sale Active</label>
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label-sm">Sale Ends At</label>
              <input type="datetime-local" id="flashEnds" class="form-control admin-input" onchange="saveFlashSettings()" />
            </div>
            <div class="col-md-5 text-muted small">
              <i class="bi bi-info-circle me-1"></i>When active, a countdown timer will appear on the Flash Sale page.
            </div>
          </div>
        </div>
      </div>

      <!-- Flash Sale Products -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Flash Sale Products <span class="badge bg-danger ms-1" id="flashCount">0</span></span>
        </div>
        <div class="table-responsive">
          <table class="admin-table">
            <thead><tr><th></th><th>Product</th><th>Regular Price</th><th>Flash Price</th><th>Discount</th><th class="text-center">Active</th><th>Actions</th></tr></thead>
            <tbody id="flashTable"></tbody>
          </table>
        </div>
      </div>

      <!-- Add to Flash Sale -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Add Product to Flash Sale</span></div>
        <div class="panel-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-5">
              <label class="form-label-sm">Select Product</label>
              <select id="flashProdSelect" class="form-select admin-input"></select>
            </div>
            <div class="col-md-3">
              <label class="form-label-sm">Flash Price (৳)</label>
              <input type="number" id="flashPriceInput" class="form-control admin-input" min="0" />
            </div>
            <div class="col-md-2">
              <button class="btn btn-danger btn-primary-admin w-100" onclick="addToFlash()">Add</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/store.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  renderFlashTable();
  populateSelect();
});

function loadSettings() {
  const s = Store.settings.get();
  document.getElementById('flashActive').checked = !!s.flashSaleActive;
  document.getElementById('flashEnds').value     = s.flashSaleEnds || '';
}

function saveFlashSettings() {
  Store.settings.update({
    flashSaleActive: document.getElementById('flashActive').checked,
    flashSaleEnds:   document.getElementById('flashEnds').value
  });
  toast('Flash sale settings saved');
}

function populateSelect() {
  const prods = Store.products.all().filter(p => !p.flashSale);
  document.getElementById('flashProdSelect').innerHTML =
    '<option value="">Select product…</option>' + prods.map(p=>`<option value="${p.id}">${p.name} (${taka(p.price)})</option>`).join('');
}

function renderFlashTable() {
  const prods = Store.products.flashSale();
  document.getElementById('flashCount').textContent = prods.length;
  const tbody = document.getElementById('flashTable');
  tbody.innerHTML = prods.length
    ? prods.map(p => {
        const disc = p.originalPrice ? Math.round((1 - p.flashPrice/p.originalPrice)*100) : Math.round((1 - p.flashPrice/p.price)*100);
        return `<tr>
          <td>${productImg(p.image,p.name)}</td>
          <td class="fw-semibold">${p.name}</td>
          <td>${taka(p.price)}</td>
          <td>
            <input type="number" value="${p.flashPrice||''}" class="form-control admin-input" style="width:110px"
              onchange="updateFlashPrice(${p.id},this.value)" min="0" />
          </td>
          <td><span class="badge bg-danger">${disc>0?'-'+disc+'%':'—'}</span></td>
          <td class="text-center"><input type="checkbox" class="form-check-input" checked onchange="removeFromFlash(${p.id})"></td>
          <td><button class="btn-icon btn-delete" onclick="removeFromFlash(${p.id})"><i class="bi bi-trash"></i></button></td>
        </tr>`;
      }).join('')
    : '<tr><td colspan="7"><div class="empty-state"><i class="bi bi-lightning"></i><p>No products in flash sale</p></div></td></tr>';
}

function addToFlash() {
  const id    = +document.getElementById('flashProdSelect').value;
  const price = +document.getElementById('flashPriceInput').value;
  if (!id)    { toast('Select a product','error'); return; }
  if (!price) { toast('Enter flash price','error'); return; }
  const p     = Store.products.byId(id);
  if (price >= p.price) { toast('Flash price must be lower than regular price','error'); return; }
  Store.products.update(id, { flashSale: true, flashPrice: price });
  toast('Added to flash sale');
  renderFlashTable();
  populateSelect();
}

function updateFlashPrice(id, val) {
  Store.products.update(id, { flashPrice: +val });
  toast('Flash price updated');
  renderFlashTable();
}

function removeFromFlash(id) {
  Store.products.update(id, { flashSale: false, flashPrice: null });
  toast('Removed from flash sale','warning');
  renderFlashTable();
  populateSelect();
}
</script>
</body>
</html>
