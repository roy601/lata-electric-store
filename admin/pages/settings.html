<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Settings – Lata Electric Admin</title>
  <link rel="icon" href="../../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body data-page="settings" data-title="Settings" data-subtitle="Configure site and admin settings">
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>
  <div class="admin-main">
    <header class="admin-topbar" id="adminTopbar"></header>
    <div class="admin-content">
      <div class="page-header">
        <div>
          <div class="breadcrumb"><a href="../index.html">Dashboard</a> / Settings</div>
          <h1>Settings</h1>
        </div>
        <button class="btn btn-danger btn-primary-admin" onclick="saveSettings()"><i class="bi bi-save me-1"></i>Save All Settings</button>
      </div>

      <div class="row g-4">
        <div class="col-lg-8">

          <!-- Store Info -->
          <div class="panel">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-shop me-2"></i>Store Information</span></div>
            <div class="panel-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label-sm">Store Name</label>
                  <input type="text" id="siteName" class="form-control admin-input" />
                </div>
                <div class="col-md-6">
                  <label class="form-label-sm">Phone Number</label>
                  <input type="tel" id="phone" class="form-control admin-input" />
                </div>
                <div class="col-12">
                  <label class="form-label-sm">Address</label>
                  <input type="text" id="address" class="form-control admin-input" />
                </div>
                <div class="col-md-6">
                  <label class="form-label-sm">Email</label>
                  <input type="email" id="email" class="form-control admin-input" />
                </div>
                <div class="col-md-6">
                  <label class="form-label-sm">Business Hours</label>
                  <input type="text" id="hours" class="form-control admin-input" placeholder="Sat–Thu: 9am – 8pm" />
                </div>
              </div>
            </div>
          </div>

          <!-- Homepage Content -->
          <div class="panel">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-layout-text-window me-2"></i>Homepage Content</span></div>
            <div class="panel-body">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label-sm">Hero Title</label>
                  <input type="text" id="heroTitle" class="form-control admin-input" />
                </div>
                <div class="col-12">
                  <label class="form-label-sm">Hero Subtitle</label>
                  <textarea id="heroSubtitle" class="form-control admin-input" rows="2"></textarea>
                </div>
                <div class="col-12">
                  <label class="form-label-sm">Announcement Bar Text</label>
                  <input type="text" id="announcementBar" class="form-control admin-input" placeholder="Free Delivery on Orders Above ৳1000" />
                </div>
              </div>
            </div>
          </div>

          <!-- Social Media -->
          <div class="panel">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-share me-2"></i>Social Media</span></div>
            <div class="panel-body">
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label-sm"><i class="bi bi-facebook me-1 text-primary"></i>Facebook URL</label>
                  <input type="url" id="facebook" class="form-control admin-input" placeholder="https://facebook.com/…" />
                </div>
                <div class="col-md-4">
                  <label class="form-label-sm"><i class="bi bi-whatsapp me-1 text-success"></i>WhatsApp Number</label>
                  <input type="tel" id="whatsapp" class="form-control admin-input" placeholder="8801XXXXXXXXX" />
                </div>
                <div class="col-md-4">
                  <label class="form-label-sm"><i class="bi bi-youtube me-1 text-danger"></i>YouTube URL</label>
                  <input type="url" id="youtube" class="form-control admin-input" placeholder="https://youtube.com/…" />
                </div>
              </div>
            </div>
          </div>

          <!-- Security -->
          <div class="panel">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-shield-lock me-2"></i>Admin Security</span></div>
            <div class="panel-body">
              <div class="row g-3">
                <div class="col-md-5">
                  <label class="form-label-sm">New Admin Password</label>
                  <input type="password" id="newPw" class="form-control admin-input" placeholder="Leave blank to keep current" autocomplete="new-password" />
                </div>
                <div class="col-md-5">
                  <label class="form-label-sm">Confirm Password</label>
                  <input type="password" id="confirmPw" class="form-control admin-input" placeholder="Repeat new password" autocomplete="new-password" />
                </div>
                <div class="col-md-2 d-flex align-items-end">
                  <button class="btn btn-outline-danger w-100" onclick="changePassword()">Update</button>
                </div>
              </div>
            </div>
          </div>

        </div>

        <div class="col-lg-4">
          <!-- Data Management -->
          <div class="panel">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-database me-2"></i>Data Management</span></div>
            <div class="panel-body d-grid gap-2">
              <button class="btn btn-outline-secondary btn-sm" onclick="exportData()"><i class="bi bi-download me-1"></i>Export All Data (JSON)</button>
              <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('importFile').click()"><i class="bi bi-upload me-1"></i>Import Data (JSON)</button>
              <input type="file" id="importFile" accept=".json" class="d-none" onchange="importData(this)" />
              <hr />
              <button class="btn btn-outline-danger btn-sm" onclick="resetData()"><i class="bi bi-arrow-counterclockwise me-1"></i>Reset to Seed Data</button>
            </div>
          </div>

          <!-- System Info -->
          <div class="panel">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-info-circle me-2"></i>System Info</span></div>
            <div class="panel-body" id="sysInfo"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/store.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const s = Store.settings.get();
  document.getElementById('siteName').value         = s.siteName || 'Lata Electric';
  document.getElementById('phone').value            = s.phone || '';
  document.getElementById('address').value          = s.address || '';
  document.getElementById('email').value            = s.email || '';
  document.getElementById('hours').value            = s.hours || 'Sat–Thu: 9am – 8pm';
  document.getElementById('heroTitle').value        = s.heroTitle || '';
  document.getElementById('heroSubtitle').value     = s.heroSubtitle || '';
  document.getElementById('announcementBar').value  = s.announcementBar || '';
  document.getElementById('facebook').value         = s.facebook || '';
  document.getElementById('whatsapp').value         = s.whatsapp || '';
  document.getElementById('youtube').value          = s.youtube || '';

  document.getElementById('sysInfo').innerHTML = `
    <div class="small">
      <div class="d-flex justify-content-between mb-1"><span class="text-muted">Products</span><strong>${Store.products.all().length}</strong></div>
      <div class="d-flex justify-content-between mb-1"><span class="text-muted">Categories</span><strong>${Store.categories.all().length}</strong></div>
      <div class="d-flex justify-content-between mb-1"><span class="text-muted">Orders</span><strong>${Store.orders.all().length}</strong></div>
      <div class="d-flex justify-content-between mb-1"><span class="text-muted">Customers</span><strong>${Store.customers.all().length}</strong></div>
      <div class="d-flex justify-content-between"><span class="text-muted">Storage Used</span><strong>${(JSON.stringify(localStorage).length/1024).toFixed(1)} KB</strong></div>
    </div>`;
});

function saveSettings() {
  Store.settings.update({
    siteName:        document.getElementById('siteName').value.trim(),
    phone:           document.getElementById('phone').value.trim(),
    address:         document.getElementById('address').value.trim(),
    email:           document.getElementById('email').value.trim(),
    hours:           document.getElementById('hours').value.trim(),
    heroTitle:       document.getElementById('heroTitle').value.trim(),
    heroSubtitle:    document.getElementById('heroSubtitle').value.trim(),
    announcementBar: document.getElementById('announcementBar').value.trim(),
    facebook:        document.getElementById('facebook').value.trim(),
    whatsapp:        document.getElementById('whatsapp').value.trim(),
    youtube:         document.getElementById('youtube').value.trim(),
  });
  toast('Settings saved');
}

function changePassword() {
  const pw1 = document.getElementById('newPw').value;
  const pw2 = document.getElementById('confirmPw').value;
  if (!pw1) { toast('Enter a new password','error'); return; }
  if (pw1 !== pw2) { toast('Passwords do not match','error'); return; }
  if (pw1.length < 6) { toast('Password must be at least 6 characters','error'); return; }
  Store.settings.update({ adminPassword: pw1 });
  document.getElementById('newPw').value = '';
  document.getElementById('confirmPw').value = '';
  toast('Password updated');
}

function exportData() {
  const data = {
    products:   Store.products.all(),
    categories: Store.categories.all(),
    orders:     Store.orders.all(),
    customers:  Store.customers.all(),
    settings:   Store.settings.get(),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `lata-electric-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Data exported');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.products)   localStorage.setItem('lata_products',   JSON.stringify(data.products));
      if (data.categories) localStorage.setItem('lata_categories', JSON.stringify(data.categories));
      if (data.orders)     localStorage.setItem('lata_orders',     JSON.stringify(data.orders));
      if (data.customers)  localStorage.setItem('lata_customers',  JSON.stringify(data.customers));
      if (data.settings)   localStorage.setItem('lata_settings',   JSON.stringify(data.settings));
      toast('Data imported — reloading…');
      setTimeout(() => location.reload(), 1200);
    } catch { toast('Invalid JSON file','error'); }
  };
  reader.readAsText(file);
}

function resetData() {
  if (!confirm('This will DELETE all products, orders, customers and reset to seed data. Are you sure?')) return;
  ['lata_products','lata_categories','lata_orders','lata_customers','lata_seeded'].forEach(k => localStorage.removeItem(k));
  toast('Reset complete — reloading…');
  setTimeout(() => location.reload(), 1200);
}
</script>
</body>
</html>
