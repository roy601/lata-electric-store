<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Orders – Lata Electric Admin</title>
  <link rel="icon" href="../../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body data-page="orders" data-title="Orders" data-subtitle="Manage and track all customer orders">
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>
  <div class="admin-main">
    <header class="admin-topbar" id="adminTopbar"></header>
    <div class="admin-content">

      <div class="page-header">
        <div>
          <div class="breadcrumb"><a href="../index.html">Dashboard</a> / Orders</div>
          <h1>Orders</h1>
        </div>
      </div>

      <!-- Order Stats -->
      <div class="stat-grid" id="orderStats"></div>

      <div class="panel">
        <div class="panel-header">
          <div class="filter-bar">
            <input type="search" id="searchOrder" class="form-control" placeholder="Search order ID or customer…" />
            <select id="filterStatus" class="form-select" style="max-width:160px">
              <option value="">All Status</option>
              <option value="pending">Pending</option>
              <option value="confirmed">Confirmed</option>
              <option value="shipped">Shipped</option>
              <option value="delivered">Delivered</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="table-responsive">
          <table class="admin-table">
            <thead><tr><th>Order ID</th><th>Customer</th><th>Phone</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody id="ordersTable"></tbody>
          </table>
        </div>
        <div class="d-flex justify-content-end p-3" id="orderPagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Order Detail Modal -->
<div class="modal fade" id="orderModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Order Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="orderDetail"></div>
      <div class="modal-footer">
        <select id="statusSelect" class="form-select" style="max-width:160px"></select>
        <button class="btn btn-danger btn-primary-admin" onclick="updateOrderStatus()">Update Status</button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/store.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
let currentPage = 1;
const PER_PAGE  = 15;
let modal, activeOrderId;
const STATUSES  = ['pending','confirmed','shipped','delivered','cancelled'];

document.addEventListener('DOMContentLoaded', () => {
  modal = new bootstrap.Modal(document.getElementById('orderModal'));
  renderStats();
  renderTable();
  document.getElementById('searchOrder').addEventListener('input', () => { currentPage=1; renderTable(); });
  document.getElementById('filterStatus').addEventListener('change', () => { currentPage=1; renderTable(); });
  document.getElementById('statusSelect').innerHTML = STATUSES.map(s=>`<option value="${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('');
});

function renderStats() {
  const s = Store.orders.stats();
  const cards = [
    { label:'Total Orders',  value:s.total,     color:'#2980b9', icon:'bi-bag' },
    { label:'Pending',       value:s.pending,   color:'#f39c12', icon:'bi-clock' },
    { label:'Shipped',       value:s.shipped,   color:'#8e44ad', icon:'bi-truck' },
    { label:'Delivered',     value:s.delivered, color:'#27ae60', icon:'bi-check-circle' },
    { label:'Total Revenue', value:taka(s.revenue), color:'#c0392b', icon:'bi-currency-dollar' },
  ];
  document.getElementById('orderStats').innerHTML = cards.map(c=>`
    <div class="stat-card">
      <div class="stat-icon" style="background:${c.color}"><i class="bi ${c.icon}"></i></div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-label">${c.label}</div>
    </div>`).join('');
}

function getFiltered() {
  let list = Store.orders.all();
  const q  = document.getElementById('searchOrder').value.toLowerCase();
  const st = document.getElementById('filterStatus').value;
  if (q)  list = list.filter(o => o.id.toLowerCase().includes(q) || (o.customer?.name||'').toLowerCase().includes(q));
  if (st) list = list.filter(o => o.status === st);
  return list;
}

function renderTable() {
  const filtered = getFiltered();
  const { items, pages } = paginate(filtered, currentPage, PER_PAGE);
  const tbody = document.getElementById('ordersTable');
  if (!items.length) { tbody.innerHTML='<tr><td colspan="9"><div class="empty-state"><i class="bi bi-bag"></i><p>No orders found</p></div></td></tr>'; return; }
  tbody.innerHTML = items.map(o=>`
    <tr class="order-row-${o.status}">
      <td><a href="#" class="fw-semibold text-danger" onclick="viewOrder('${o.id}');return false;">${o.id}</a></td>
      <td>${o.customer?.name||'—'}</td>
      <td>${o.customer?.phone||'—'}</td>
      <td>${(o.items||[]).length}</td>
      <td class="fw-semibold">${taka(o.total)}</td>
      <td>${o.paymentMethod||'—'}</td>
      <td>${statusBadge(o.status)}</td>
      <td>${fmtDate(o.createdAt)}</td>
      <td>
        <button class="btn-icon btn-view me-1" onclick="viewOrder('${o.id}')" title="View"><i class="bi bi-eye"></i></button>
        <button class="btn-icon btn-delete" onclick="deleteOrder('${o.id}')" title="Delete"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
  renderPagination('orderPagination', currentPage, pages, p=>{ currentPage=p; renderTable(); });
}

function viewOrder(id) {
  const o = Store.orders.byId(id);
  if (!o) return;
  activeOrderId = id;
  document.getElementById('statusSelect').value = o.status;
  document.getElementById('orderDetail').innerHTML = `
    <div class="row g-3">
      <div class="col-md-6">
        <div class="p-3 rounded bg-light">
          <div class="fw-bold mb-2">Customer Info</div>
          <div>${o.customer?.name||'—'}</div>
          <div>${o.customer?.phone||''}</div>
          <div>${o.customer?.email||''}</div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="p-3 rounded bg-light">
          <div class="fw-bold mb-2">Delivery Address</div>
          <div>${o.customer?.address||'—'}</div>
          <div class="mt-2 fw-semibold">Payment: ${o.paymentMethod||'—'}</div>
          <div>Order Date: ${fmtDate(o.createdAt)}</div>
        </div>
      </div>
    </div>
    <div class="mt-3">
      <div class="fw-bold mb-2">Order Items</div>
      <table class="admin-table">
        <thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Subtotal</th></tr></thead>
        <tbody>
          ${(o.items||[]).map(item=>`<tr><td>${item.name}</td><td>${taka(item.price)}</td><td>${item.qty}</td><td>${taka(item.price*item.qty)}</td></tr>`).join('')}
        </tbody>
        <tfoot>
          <tr><td colspan="3" class="text-end fw-bold">Shipping</td><td>${taka(o.shipping||0)}</td></tr>
          <tr><td colspan="3" class="text-end fw-bold">Total</td><td class="fw-bold text-danger fs-6">${taka(o.total)}</td></tr>
        </tfoot>
      </table>
    </div>
    ${o.note?`<div class="mt-2 p-2 bg-warning bg-opacity-10 rounded small"><strong>Note:</strong> ${o.note}</div>`:''}`;
  modal.show();
}

function updateOrderStatus() {
  const st = document.getElementById('statusSelect').value;
  Store.orders.updateStatus(activeOrderId, st);
  toast('Order status updated');
  modal.hide();
  renderTable();
  renderStats();
}

function deleteOrder(id) {
  confirmDelete('Delete this order?', () => { Store.orders.delete(id); toast('Order deleted','warning'); renderTable(); renderStats(); });
}
</script>
</body>
</html>
