<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Products – Lata Electric Admin</title>
  <link rel="icon" href="../../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body data-page="products" data-title="Products" data-subtitle="Manage your product catalogue">
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>
  <div class="admin-main">
    <header class="admin-topbar" id="adminTopbar"></header>
    <div class="admin-content">

      <div class="page-header">
        <div>
          <div class="breadcrumb"><a href="../index.html">Dashboard</a> / Products</div>
          <h1>Products</h1>
        </div>
        <button class="btn btn-danger btn-primary-admin" onclick="openProductModal()">
          <i class="bi bi-plus-circle me-1"></i>Add Product
        </button>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="filter-bar">
            <input type="search" id="searchProd" class="form-control" placeholder="Search products…" />
            <select id="filterCat" class="form-select" style="max-width:180px"></select>
            <select id="filterStatus" class="form-select" style="max-width:150px">
              <option value="">All Status</option>
              <option value="featured">Featured</option>
              <option value="topSell">Top Sell</option>
              <option value="flashSale">Flash Sale</option>
              <option value="lowstock">Low Stock (&lt;10)</option>
            </select>
          </div>
          <span class="text-muted small ms-auto" id="prodCount"></span>
        </div>
        <div class="table-responsive">
          <table class="admin-table">
            <thead><tr>
              <th style="width:44px"></th>
              <th>Product</th><th>Category</th><th>Price</th><th>Stock</th>
              <th>Featured</th><th>Top Sell</th><th>Flash</th><th style="width:100px">Actions</th>
            </tr></thead>
            <tbody id="productsTable"></tbody>
          </table>
        </div>
        <div class="d-flex justify-content-end p-3" id="prodPagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="productForm" novalidate>
          <input type="hidden" id="editId" />
          <div class="form-section-title">Basic Information</div>
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label-sm">Product Name *</label>
              <input type="text" id="fName" class="form-control admin-input" required />
            </div>
            <div class="col-md-4">
              <label class="form-label-sm">SKU</label>
              <input type="text" id="fSku" class="form-control admin-input" />
            </div>
            <div class="col-md-6">
              <label class="form-label-sm">Category *</label>
              <select id="fCat" class="form-select admin-input" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label-sm">Brand</label>
              <input type="text" id="fBrand" class="form-control admin-input" />
            </div>
            <div class="col-12">
              <label class="form-label-sm">Description</label>
              <textarea id="fDesc" class="form-control admin-input" rows="3"></textarea>
            </div>
          </div>

          <div class="form-section-title">Pricing & Stock</div>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label-sm">Sale Price (৳) *</label>
              <input type="number" id="fPrice" class="form-control admin-input" min="0" required />
            </div>
            <div class="col-md-4">
              <label class="form-label-sm">Original Price (৳)</label>
              <input type="number" id="fOrigPrice" class="form-control admin-input" min="0" />
            </div>
            <div class="col-md-4">
              <label class="form-label-sm">Stock Quantity *</label>
              <input type="number" id="fStock" class="form-control admin-input" min="0" required />
            </div>
          </div>

          <div class="form-section-title">Visibility & Promotions</div>
          <div class="row g-3">
            <div class="col-md-4">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="fFeatured" />
                <label class="form-check-label fw-semibold" for="fFeatured">Featured on Homepage</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="fTopSell" />
                <label class="form-check-label fw-semibold" for="fTopSell">Top Sell</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="fFlash" onchange="toggleFlashPrice(this)" />
                <label class="form-check-label fw-semibold" for="fFlash">Flash Sale</label>
              </div>
            </div>
            <div class="col-md-4" id="flashPriceWrap" style="display:none">
              <label class="form-label-sm">Flash Sale Price (৳)</label>
              <input type="number" id="fFlashPrice" class="form-control admin-input" min="0" />
            </div>
          </div>

          <div class="form-section-title">Product Image</div>
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label-sm">Image URL</label>
              <input type="url" id="fImage" class="form-control admin-input" placeholder="https://…" oninput="previewImg(this.value)" />
            </div>
            <div class="col-md-4">
              <div id="imgPreview" class="img-upload-box d-flex align-items-center justify-content-center" style="height:80px">
                <i class="bi bi-image fs-3 text-muted"></i>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger btn-primary-admin" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/store.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
let currentPage = 1;
const PER_PAGE  = 15;
let modal;

document.addEventListener('DOMContentLoaded', () => {
  modal = new bootstrap.Modal(document.getElementById('productModal'));
  populateCategoryFilters();
  renderTable();

  document.getElementById('searchProd').addEventListener('input', () => { currentPage=1; renderTable(); });
  document.getElementById('filterCat').addEventListener('change', () => { currentPage=1; renderTable(); });
  document.getElementById('filterStatus').addEventListener('change', () => { currentPage=1; renderTable(); });

  /* Auto-open add modal if ?action=add */
  if (new URLSearchParams(location.search).get('action')==='add') openProductModal();
});

function populateCategoryFilters() {
  const cats = Store.categories.all();
  const html = '<option value="">All Categories</option>' + cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('filterCat').innerHTML = html;
  document.getElementById('fCat').innerHTML = '<option value="">Select category…</option>' + cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

function getFiltered() {
  let list = Store.products.all();
  const q   = document.getElementById('searchProd').value.toLowerCase();
  const cat = document.getElementById('filterCat').value;
  const st  = document.getElementById('filterStatus').value;
  if (q)   list = list.filter(p => p.name.toLowerCase().includes(q) || (p.brand||'').toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q));
  if (cat) list = list.filter(p => p.categoryId === +cat);
  if (st === 'featured')  list = list.filter(p => p.featured);
  if (st === 'topSell')   list = list.filter(p => p.topSell);
  if (st === 'flashSale') list = list.filter(p => p.flashSale);
  if (st === 'lowstock')  list = list.filter(p => p.stock < 10);
  return list;
}

function renderTable() {
  const filtered = getFiltered();
  const { items, total, pages } = paginate(filtered, currentPage, PER_PAGE);
  document.getElementById('prodCount').textContent = `${total} product${total!==1?'s':''}`;

  const tbody = document.getElementById('productsTable');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><i class="bi bi-box-seam"></i><p>No products found</p></div></td></tr>';
    return;
  }

  tbody.innerHTML = items.map(p => `
    <tr>
      <td>${productImg(p.image, p.name)}</td>
      <td>
        <div class="fw-semibold">${p.name}</div>
        <div class="text-muted" style="font-size:0.72rem">${p.brand||''} ${p.sku?'· '+p.sku:''}</div>
      </td>
      <td>${catName(p.categoryId)}</td>
      <td>
        <div class="fw-semibold">${taka(p.price)}</div>
        ${p.originalPrice && p.originalPrice>p.price ? `<div class="text-muted text-decoration-line-through" style="font-size:0.72rem">${taka(p.originalPrice)}</div>`:''}
      </td>
      <td><span class="${p.stock<10?'text-danger fw-bold':''}">${p.stock}</span></td>
      <td><input type="checkbox" class="form-check-input" ${p.featured?'checked':''} onchange="toggleField(${p.id},'featured',this.checked)"></td>
      <td><input type="checkbox" class="form-check-input" ${p.topSell?'checked':''} onchange="toggleField(${p.id},'topSell',this.checked)"></td>
      <td><input type="checkbox" class="form-check-input" ${p.flashSale?'checked':''} onchange="toggleField(${p.id},'flashSale',this.checked)"></td>
      <td>
        <button class="btn-icon btn-edit me-1" onclick="openProductModal(${p.id})" title="Edit"><i class="bi bi-pencil"></i></button>
        <button class="btn-icon btn-delete" onclick="deleteProduct(${p.id})" title="Delete"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');

  renderPagination('prodPagination', currentPage, pages, p => { currentPage=p; renderTable(); });
}

function toggleField(id, field, val) {
  Store.products.update(id, { [field]: val });
  toast(`${field} updated`, 'success');
}

function openProductModal(id) {
  document.getElementById('productForm').reset();
  document.getElementById('imgPreview').innerHTML = '<i class="bi bi-image fs-3 text-muted"></i>';
  document.getElementById('flashPriceWrap').style.display = 'none';

  if (id) {
    const p = Store.products.byId(id);
    if (!p) return;
    document.getElementById('modalTitle').textContent = 'Edit Product';
    document.getElementById('editId').value       = id;
    document.getElementById('fName').value        = p.name;
    document.getElementById('fSku').value         = p.sku || '';
    document.getElementById('fBrand').value       = p.brand || '';
    document.getElementById('fDesc').value        = p.description || '';
    document.getElementById('fCat').value         = p.categoryId;
    document.getElementById('fPrice').value       = p.price;
    document.getElementById('fOrigPrice').value   = p.originalPrice || '';
    document.getElementById('fStock').value       = p.stock;
    document.getElementById('fImage').value       = p.image || '';
    document.getElementById('fFeatured').checked  = !!p.featured;
    document.getElementById('fTopSell').checked   = !!p.topSell;
    document.getElementById('fFlash').checked     = !!p.flashSale;
    document.getElementById('fFlashPrice').value  = p.flashPrice || '';
    if (p.flashSale) document.getElementById('flashPriceWrap').style.display = '';
    if (p.image)     previewImg(p.image);
  } else {
    document.getElementById('modalTitle').textContent = 'Add Product';
    document.getElementById('editId').value = '';
  }
  modal.show();
}

function saveProduct() {
  const form = document.getElementById('productForm');
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const data = {
    name:         document.getElementById('fName').value.trim(),
    sku:          document.getElementById('fSku').value.trim(),
    brand:        document.getElementById('fBrand').value.trim(),
    description:  document.getElementById('fDesc').value.trim(),
    categoryId:   +document.getElementById('fCat').value,
    price:        +document.getElementById('fPrice').value,
    originalPrice:+document.getElementById('fOrigPrice').value || null,
    stock:        +document.getElementById('fStock').value,
    image:        document.getElementById('fImage').value.trim(),
    featured:     document.getElementById('fFeatured').checked,
    topSell:      document.getElementById('fTopSell').checked,
    flashSale:    document.getElementById('fFlash').checked,
    flashPrice:   document.getElementById('fFlash').checked ? +document.getElementById('fFlashPrice').value || null : null,
  };
  const id = document.getElementById('editId').value;
  if (id) { Store.products.update(+id, data); toast('Product updated'); }
  else    { Store.products.add(data);          toast('Product added'); }
  modal.hide();
  renderTable();
}

function deleteProduct(id) {
  confirmDelete(`Delete "${Store.products.byId(id)?.name}"?`, () => {
    Store.products.delete(id);
    toast('Product deleted', 'warning');
    renderTable();
  });
}

function toggleFlashPrice(cb) {
  document.getElementById('flashPriceWrap').style.display = cb.checked ? '' : 'none';
}

function previewImg(url) {
  const box = document.getElementById('imgPreview');
  if (url) box.innerHTML = `<img src="${url}" style="max-height:76px;border-radius:6px;object-fit:contain" onerror="this.parentNode.innerHTML='<i class=\\'bi bi-broken-image fs-3 text-muted\\'></i>'">`;
  else     box.innerHTML = '<i class="bi bi-image fs-3 text-muted"></i>';
}
</script>
</body>
</html>
