<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Shipping – Lata Electric Admin</title>
  <link rel="icon" href="../../assets/images/logo.jpg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body data-page="shipping" data-title="Shipping" data-subtitle="Set delivery rates and zones">
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>
  <div class="admin-main">
    <header class="admin-topbar" id="adminTopbar"></header>
    <div class="admin-content">
      <div class="page-header">
        <div>
          <div class="breadcrumb"><a href="../index.html">Dashboard</a> / Shipping</div>
          <h1>Shipping Settings</h1>
        </div>
        <button class="btn btn-danger btn-primary-admin" onclick="saveShipping()"><i class="bi bi-save me-1"></i>Save Changes</button>
      </div>

      <div class="row g-4">
        <div class="col-lg-7">
          <div class="panel">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-truck me-2"></i>Delivery Rates</span></div>
            <div class="panel-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label-sm">Inside Dhaka (৳)</label>
                  <input type="number" id="insideDhaka" class="form-control admin-input" min="0" placeholder="60" />
                </div>
                <div class="col-md-6">
                  <label class="form-label-sm">Outside Dhaka (৳)</label>
                  <input type="number" id="outsideDhaka" class="form-control admin-input" min="0" placeholder="120" />
                </div>
                <div class="col-12">
                  <label class="form-label-sm">Free Delivery Above (৳)</label>
                  <input type="number" id="freeDelivery" class="form-control admin-input" min="0" placeholder="1000" />
                  <div class="form-text">Set 0 to disable free delivery threshold</div>
                </div>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-clock me-2"></i>Delivery Time</span></div>
            <div class="panel-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label-sm">Inside Dhaka</label>
                  <input type="text" id="timeDhaka" class="form-control admin-input" placeholder="Same Day / Next Day" />
                </div>
                <div class="col-md-6">
                  <label class="form-label-sm">Outside Dhaka</label>
                  <input type="text" id='timeOutside' class="form-control admin-input" placeholder="2-4 Business Days" />
                </div>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-header"><span class="panel-title"><i class="bi bi-info-circle me-2"></i>Shipping Notes</span></div>
            <div class="panel-body">
              <label class="form-label-sm">Additional Information for Customers</label>
              <textarea id="shippingNote" class="form-control admin-input" rows="3" placeholder="e.g. Delivery available across Bangladesh via courier. Heavy items may incur extra charges."></textarea>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="panel">
            <div class="panel-header"><span class="panel-title">Shipping Preview</span></div>
            <div class="panel-body" id="shippingPreview"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/store.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const s = Store.settings.get();
  document.getElementById('insideDhaka').value  = s.shipping?.inside  || 60;
  document.getElementById('outsideDhaka').value = s.shipping?.outside || 120;
  document.getElementById('freeDelivery').value = s.freeDeliveryThreshold || 1000;
  document.getElementById('timeDhaka').value    = s.deliveryTime?.inside  || 'Same Day / Next Day';
  document.getElementById('timeOutside').value  = s.deliveryTime?.outside || '2-4 Business Days';
  document.getElementById('shippingNote').value = s.shippingNote || '';
  updatePreview();
  ['insideDhaka','outsideDhaka','freeDelivery','timeDhaka','timeOutside'].forEach(id =>
    document.getElementById(id).addEventListener('input', updatePreview));
});

function updatePreview() {
  const inside  = document.getElementById('insideDhaka').value  || 60;
  const outside = document.getElementById('outsideDhaka').value || 120;
  const free    = document.getElementById('freeDelivery').value || 0;
  const tIn     = document.getElementById('timeDhaka').value    || 'Same Day / Next Day';
  const tOut    = document.getElementById('timeOutside').value  || '2-4 Business Days';
  document.getElementById('shippingPreview').innerHTML = `
    <div class="d-flex align-items-center justify-content-between mb-3 p-3 rounded" style="background:#f8f9fa">
      <div>
        <div class="fw-semibold small">Inside Dhaka</div>
        <div class="text-muted" style="font-size:0.75rem">${tIn}</div>
      </div>
      <div class="fw-bold text-danger">${taka(inside)}</div>
    </div>
    <div class="d-flex align-items-center justify-content-between mb-3 p-3 rounded" style="background:#f8f9fa">
      <div>
        <div class="fw-semibold small">Outside Dhaka</div>
        <div class="text-muted" style="font-size:0.75rem">${tOut}</div>
      </div>
      <div class="fw-bold text-danger">${taka(outside)}</div>
    </div>
    ${+free > 0 ? `<div class="p-3 rounded text-center" style="background:#d1e7dd;color:#0a3622">
      <i class="bi bi-truck me-1"></i><strong>Free delivery</strong> on orders above <strong>${taka(free)}</strong>
    </div>` : ''}`;
}

function saveShipping() {
  Store.settings.update({
    shipping: {
      inside:  +document.getElementById('insideDhaka').value  || 60,
      outside: +document.getElementById('outsideDhaka').value || 120
    },
    freeDeliveryThreshold: +document.getElementById('freeDelivery').value || 0,
    deliveryTime: {
      inside:  document.getElementById('timeDhaka').value,
      outside: document.getElementById('timeOutside').value
    },
    shippingNote: document.getElementById('shippingNote').value.trim()
  });
  toast('Shipping settings saved');
}
</script>
</body>
</html>
